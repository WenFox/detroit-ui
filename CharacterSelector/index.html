<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <title>Character Selector</title>
</head>
<body>
    <div class="wrapper">
        <div class="character-selector">
            <div class="character-slot">
                <div class="character-slot-container">
                    <div class="character-slot__name">
                        Alex Morales
                    </div>
                    <div class="character-slot__main">
                        <div class="character-slot__photo">
                            <img src=img/character_photo.png alt="photo">
                        </div>
                        <div class="character-slot__info">
                            <div class="character-slot__last-login">
                                <div class="ui-label">
                                    <div class="ui-label__text">Последний вход</div>
                                    <div class="ui-label__value">11.11.2021</div>
                                </div>
                            </div>
                            <div class="character-slot__level">
                                <div class="ui-label">
                                    <div class="ui-label__text">Уровень</div>
                                    <div class="ui-label__value">25</div>
                                </div>
                            </div>
                            <div class="character-slot__game-time">
                                <div class="ui-label">
                                    <div class="ui-label__text">Время в игре</div>
                                    <div class="ui-label__value">1242 часов</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="character-slot__about">
                        <div class="character-slot__left-column">
                            <div class="character-slot__bank">
                                <div class="ui-label">
                                    <div class="ui-label__text">Счет в банке</div>
                                    <div class="ui-label__value">$135445542</div>
                                </div>
                            </div>
                            <div class="character-slot__money">
                                <div class="ui-label">
                                    <div class="ui-label__text">Наличка</div>
                                    <div class="ui-label__value">$1355542</div>
                                </div>
                            </div>
                            <div class="character-slot_exp">
                                <div class="ui-label">
                                    <div class="ui-label__text">Опыт</div>
                                    <div class="ui-label__value">9/12</div>
                                </div>
                            </div>
                        </div>
                        <div class="character-slot__right-column">
                            <div class="character-slot__fraction">
                                <div class="ui-label">
                                    <div class="ui-label__text">Фракция</div>
                                    <div class="ui-label__value">LSPD</div>
                                </div>
                            </div>
                            <div class="character-slot__job">
                                <div class="ui-label">
                                    <div class="ui-label__text">Работа</div>
                                    <div class="ui-label__value">Безработный</div>
                                </div>
                            </div>
                            <div class="character-slot__regDate">
                                <div class="ui-label">
                                    <div class="ui-label__text">Дата создания</div>
                                    <div class="ui-label__value">10.11.2021</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="character-slot__buttons">
                        <div class="character-slot__delete">
                            <a href=""><img src="img/btn_delete.svg" alt="delete"></a>
                        </div>
                        <div class="character-slot__play">
                            <div class="button">
                                <a href=""><div class="create-button">Играть</div></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

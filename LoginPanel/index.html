<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Detroit-RP.com</title>
        <meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
      <div class="wrapper">
        <!--Авторизация-->
        <div class="login-panel" style="display: none;">
          <div class="header">
            <h1 class="header__text"><span>D</span>E<span>T</span>ROI<span>T</span></h1>
            <h2 class="header__text">ROLE PLAY</h2>
            <h3 class="header__text">Будущее уже наступило</h3>
          </div>
          <div class="login-panel__message input__text ">
            Неверный логин или пароль
          </div>
          <div class="panel">
            <div class="panel_content">
              <div class="ui-input">
                <div class="panel__login">
                  <div class="ui-input__text">Логин</div>
                  <input type="text" class="ui-input__field" placeholder="Введите свой логин">
                </div>
              </div>  
              <div class="ui-input">
                <div class="panel__password">
                  <div class="ui-input__text">Пароль</div>
                  <input type="password" class="ui-input__field" placeholder="Введите свой пароль">
                </div>
              </div>  
              <div class="panel__logo">
                <img src="img/logo/1.png" alt=""><img src="img/logo/2.png" alt=""><img src="img/logo/3.png" alt="">
              </div>
            </div>
            
          </div>
          <div class="links">
            <div class="links__content">
              <div class="button">
                <a href="#" class="login__btn auth-button">Войти</a>
              </div>
            <a href="#" class="links__btn">Регистрация</a>
            <a href="#" class="links__btn">Забыли пароль?</a>
          </div>
        
        </div>
      <!--Регистрация-->  
      </div>
      <div class="login-panel" style="display: flex;">
        <div class="header">
          <h1 class="header__text"><span>D</span>E<span>T</span>ROI<span>T</span></h1>
          <h2 class="header__text">ROLE PLAY</h2>
        </div>
        <div class="register-form">
          <div class="register-form__header">
            <div class="register-form__header-text"><img src="img/register/logo.png" alt=""> Создание нового аккаунта</div>
          </div>
          <div class="register-form__message-zone">
              Ой, похоже этот Email уже существует
          </div>
          <div class="register-form__panel">
            <div class="register-form-block">
              <div class="register-form-block__content">
                <div class="ui-input">
                  <div class="ui-input__text">Логин</div>
                  <input type="text" class="ui-input__field" placeholder="Придумайте свой логин">
                </div>
                <div class="ui-input">
                  <div class="ui-input__text">Почта</div>
                  <input type="text" class="ui-input__field" placeholder="Введите свой E-Mail">
                </div>
                <div class="ui-input ui-input_hidden" id="mail-code">
                  <div class="ui-input__text">Код-подтверждения</div>
                  <input type="text" class="ui-input__field" placeholder="Введите код c почты">
                </div>
              </div>
            </div>
            <div class="register-form__panel">
              <div class="register-form-block">
                <div class="register-form-block__content">
                  <div class="ui-input">
                    <div class="ui-input__text">Пароль</div>
                    <input type="text" class="ui-input__field" placeholder="Придумайте свой пароль">
                  </div>
                  <div class="ui-input">
                    <div class="ui-input__text">Повторите пароль</div>
                    <input type="text"class="ui-input__field" placeholder="Повторите свой пароль">
                  </div>
                  <div class="ui-input ui-input_hidden" id="promocode">
                    <div class="ui-input__text">Промокод</div>
                    <input type="text" class="ui-input__field" placeholder="Промокод, если есть">
                  </div>
                </div>
              </div>
          </div>
        </div>
      </div>
      <div class="links">
        <div class="links__content">
          <div class="button">
            <a href="#" class="login__btn auth-button" onclick="enter()">Создать</a>
          </div>
          <a href="#" class="links__btn">У меня уже есть аккаунт</a>
        </div> 
      </div>
    </div>
  </div>
  <script>
    function enter()
    {
      var code = document.getElementById('promocode');
      var confirmMail = document.getElementById('mail-code');
      var flx = document.getElementById('flx');
      code.classList.add('ui-input_show');
      confirmMail.classList.add('ui-input_show');
      code.classList.remove('ui-input_hidden');
      confirmMail.classList.remove('ui-input_hidden');
      /*let _hei = flx.getBoundingClientRect().top;
      code.style.marginBottom = _hei*-1 + "px";
      code.style.display = "block";
      confirmMail.style.display = "block";*/

    }
  </script>


  </body>
</html>
